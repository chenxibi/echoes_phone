name: 角色主动消息

on:
  schedule:
    # UTC 0-14 = 北京时间 8-22 点，每个整点
    - cron: "0 0-14 * * *"
  workflow_dispatch:

jobs:
  active-message:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装依赖
        run: cd echoes-server && npm install

      - name: 生成主动消息
        env:
          ECHOES_API_BASE: ${{ secrets.ECHOES_API_BASE }}
          ECHOES_API_KEY: ${{ secrets.ECHOES_API_KEY }}
          ECHOES_API_URL: ${{ secrets.ECHOES_API_URL }}
          ECHOES_API_MODEL: ${{ secrets.ECHOES_API_MODEL }}
          ECHOES_LLM_API_KEY: ${{ secrets.ECHOES_LLM_API_KEY }}
        run: node echoes-server/scripts/active-message.js
